<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Bearbee Racing</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        .track { width: 300px; height: 500px; border: 2px solid #555; margin: 20px auto; position: relative; background: #222; overflow: hidden; }
        .car { width: 50px; height: 80px; background: red; position: absolute; bottom: 10px; transition: 0.1s; }
        .coin { width: 30px; height: 30px; background: gold; border-radius: 50%; position: absolute; }
    </style>
</head>
<body>
    <h1>Ötüşmə: <span id="score">0</span> Coin</h1>
    <div class="track" id="track">
        <div id="player" class="car" style="left: 125px;">🏎️</div>
    </div>

    <script>
        let score = 0;
        let player = document.getElementById('player');
        
        // Maşını idarə etmə
        document.addEventListener('keydown', (e) => {
            let left = parseInt(player.style.left);
            if(e.key === 'ArrowLeft' && left > 0) player.style.left = (left - 50) + 'px';
            if(e.key === 'ArrowRight' && left < 250) player.style.left = (left + 50) + 'px';
        });

        // Coin yaratma
        function spawnCoin() {
            let coin = document.createElement('div');
            coin.className = 'coin';
            coin.style.left = Math.random() * 270 + 'px';
            coin.style.top = '-30px';
            document.getElementById('track').appendChild(coin);
            
            let move = setInterval(() => {
                let top = parseInt(coin.style.top);
                coin.style.top = (top + 5) + 'px';
                
                // Coin tutma məntiqi
                if(top > 400 && Math.abs(parseInt(coin.style.left) - parseInt(player.style.left)) < 40) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    coin.remove();
                    clearInterval(move);
                }
                if(top > 500) { coin.remove(); clearInterval(move); }
            }, 50);
        }
        setInterval(spawnCoin, 2000);
    </script>
</body>
</html>
