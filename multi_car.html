<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Bearbee Yarış</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #020b05; color: #fff; text-align: center; font-family: sans-serif; }
        .screen { position: absolute; top:0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .track { width: 300px; height: 400px; background: #111; margin: 20px auto; border: 2px solid #00ff66; position: relative; overflow: hidden; }
        .car { font-size: 30px; position: absolute; bottom: 20px; transition: left 0.1s; transform: translateX(-50%); z-index: 5; }
        .obstacle { font-size: 30px; position: absolute; transform: translateX(-50%); z-index: 2; }
        .btn { padding: 15px 30px; background: #004d1a; color: #00ff66; border: 2px solid #00ff66; border-radius: 20px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>
    <div id="wait-screen" class="screen">
        <h2 id="status-text">Yüklənir...</h2>
    </div>

    <h3>Xal: <span id="score">0</span> | <span id="msg">Gözləyir...</span></h3>
    <div class="track" id="track">
        <div id="player" class="car" style="left: 50%;">🏎️</div>
    </div>
    <button class="btn" onclick="move(-30)">⬅️ SOL</button>
    <button class="btn" onclick="move(30)">SAĞ ➡️</button>

    <script>
        // Supabase Konfiqurasiyası
        const supabase = supabase.createClient('https://ywpqvvriakbbhvrtpvso.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3cHF2dnJpYWtiYmh2cnRwdnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTc0NjcsImV4cCI6MjA5NTE5MzQ2N30.C8Y7bCgTsnz8jFUoUBv8gJTvH5i7LwzLVAq43sEV2Kk');
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || { id: "test_user", username: "Guest" };
        
        const socket = io("https://bearbee-production.up.railway.app");
        let score = 0, playerPos = 50, isGameOver = true;
        const player = document.getElementById('player');

        async function initGame() {
            // Balans yoxlanışı
            const { data } = await supabase.from('users').select('balance').eq('telegram_id', user.id.toString()).single();
            if (!data || data.balance < 0.40) {
                document.getElementById('status-text').innerText = "Balansınız kifayət deyil (Min: 0.40 TON)";
                return;
            }

            document.getElementById('status-text').innerText = "Yarışçılar gözlənilir...";
            socket.emit('joinGame', { username: user.username, telegramId: user.id });
        }

        socket.on('roomUpdate', (c) => document.getElementById('status-text').innerText = "Otaqda: " + c + "/2");
        socket.on('gameStarted', () => { document.getElementById('wait-screen').style.display = 'none'; isGameOver = false; });
        socket.on('playerExploded', (id) => { 
            if(id === socket.id) { isGameOver = true; alert("Oyun bitdi! Xalınız: " + score); } 
        });

        function move(dir) {
            if(!isGameOver && (playerPos + dir >= 20 && playerPos + dir <= 80)) {
                playerPos += dir;
                player.style.left = playerPos + '%';
            }
        }

        setInterval(() => {
            if(!isGameOver) { score++; document.getElementById('score').innerText = score; }
        }, 200);

        // Obrazların düşməsi və oyun məntiqi...
        initGame();
    </script>
</body>
</html>
