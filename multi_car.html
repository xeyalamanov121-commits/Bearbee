<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bearbee Neon Race Grid</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #050a08;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
        }
        .race-panel {
            background: rgba(10, 20, 15, 0.96);
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            margin: 40px auto;
        }
        .countdown {
            font-size: 48px;
            color: #ff0055;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
        .btn-back {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #00ff66;
            color: #00ff66;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="race-panel">
        <h2 style="color: #00ffff; letter-spacing: 2px;">NEON GRID MULTIPLAYER</h2>
        <p style="font-size: 13px; color: #888;">Rəqiblər axtarılır, zəhmət olmasa gözləyin...</p>
        
        <div class="countdown" id="race-timer">00:05</div>

        <div style="border-top: 1px solid rgba(0,255,255,0.1); padding-top: 15px; font-size: 12px; color: #00ff66;">
            Otaq ID: <span id="room-id">Yüklənir...</span>
        </div>

        <button class="btn-back" onclick="goBackToMenu()">🏠 Geri Qayıt</button>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        if(tg) tg.expand();

        // Url daxilindən otaq nömrəsini təhlükəsiz şəkildə oxuyuruq
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room') || Math.floor(1000 + Math.random() * 9000);
            document.getElementById('room-id').innerText = "#" + room;
        } catch(e) {
            document.getElementById('room-id').innerText = "#Əsas Giriş";
        }

        // Sadə yarış simulyasiya taymeri (Donmanı əngəlləyən struktura malikdir)
        let timeLeft = 5;
        const timerElement = document.getElementById('race-timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = "00:0" + timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.style.color = "#00ff66";
                timerElement.innerText = "START!";
                if(tg) tg.showAlert("🏎️ Yarış başladı! Sürət limiti aktivdir.");
            }
        }, 1000);

        // Ana menyuya təhlükəsiz qayıdış funksiyası (index.html keçidi)
        function goBackToMenu() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
