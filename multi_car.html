<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bearbee Global Yarış</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #020b05; color: #fff; text-align: center; font-family: sans-serif; overflow: hidden; }
        .track { width: 350px; height: 400px; background: #111; margin: 20px auto; border: 2px solid #00ff66; position: relative; }
        .car { font-size: 30px; position: absolute; bottom: 20px; transition: left 0.1s; transform: translateX(-50%); }
        .obstacle { font-size: 30px; position: absolute; transform: translateX(-50%); }
        .btn { padding: 15px 30px; background: #004d1a; color: #00ff66; border: 2px solid #00ff66; border-radius: 20px; cursor: pointer; margin: 5px; }
        .screen { position: absolute; top:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="wait-screen" class="screen"><h2>Otaq axtarılır...</h2></div>
    <h3>Xal: <span id="score">0</span> | <span id="winner-msg">Yarış gedir...</span></h3>
    <div class="track" id="track">
        <div id="player" class="car" style="left: 50%;">🏎️</div>
    </div>
    <button class="btn" onclick="move(-30)">⬅️ SOL</button>
    <button class="btn" onclick="move(30)">SAĞ ➡️</button>

    <script>
        const socket = io("https://bearbee-production.up.railway.app");
        let score = 0, playerPos = 50, isGameOver = false;
        const player = document.getElementById('player');

        socket.emit('joinGame', { username: "Oyunçu_" + Math.floor(Math.random()*100) });
        socket.on('roomStarted', () => document.getElementById('wait-screen').style.display = 'none');
        socket.on('gameResult', (msg) => { document.getElementById('winner-msg').innerText = msg; isGameOver = true; });
        socket.on('playerExploded', (id) => { if(id === socket.id) isGameOver = true; });

        function move(dir) {
            if(!isGameOver && (playerPos + dir >= 20 && playerPos + dir <= 80)) {
                playerPos += dir;
                player.style.left = playerPos + '%';
            }
        }

        setInterval(() => {
            if(!isGameOver) { score++; document.getElementById('score').innerText = score; socket.emit('updateScore', score); }
        }, 200);

        function spawn() {
            if(isGameOver) return;
            let obs = document.createElement('div'); obs.className = 'obstacle'; obs.innerText = '🪨';
            let pos = [20, 50, 80][Math.floor(Math.random()*3)];
            obs.style.left = pos + '%'; obs.style.top = '-50px';
            document.getElementById('track').appendChild(obs);
            
            let fall = setInterval(() => {
                let top = parseInt(obs.style.top || -50);
                obs.style.top = (top + 8) + 'px';
                if (top > 300 && top < 380 && Math.abs(pos - playerPos) < 10) {
                    socket.emit('playerDied'); clearInterval(fall);
                }
                if (top > 400) { obs.remove(); clearInterval(fall); }
            }, 20);
        }
        setInterval(spawn, 1100);
    </script>
</body>
</html>
