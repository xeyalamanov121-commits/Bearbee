<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Premium Canlı Yarış</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-red: #ff3333;
            --gold-glow: #ffd700;
            --premium-dark: #020b05;
        }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0a3a1f 0%, var(--premium-dark) 100%); 
            color: #fff; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden; 
            user-select: none; 
        }

        .header { 
            padding: 15px; 
            font-size: 20px; 
            font-weight: 900; 
            color: var(--gold-glow); 
            background: linear-gradient(135deg, #0d381e 0%, #051a0d 100%); 
            border-bottom: 2px solid var(--gold-glow);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .header span {
            font-weight: 700;
        }

        .track { 
            width: 92%; 
            max-width: 400px; 
            height: 52vh; 
            background: rgba(4, 23, 12, 0.85); 
            margin: 20px auto; 
            position: relative; 
            border: 2px solid var(--neon-green);
            border-radius: 24px;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.15);
            overflow: hidden; 
        }

        /* Yolun ortasındakı premium hərəkətli xətlər */
        .track::before {
            content: '';
            position: absolute;
            top: 0; left: 35%; width: 2px; height: 100%;
            border-left: 2px dashed rgba(0, 255, 102, 0.3);
        }
        .track::after {
            content: '';
            position: absolute;
            top: 0; left: 65%; width: 2px; height: 100%;
            border-left: 2px dashed rgba(0, 255, 102, 0.3);
        }
        
        .car { 
            font-size: 45px; 
            position: absolute; 
            bottom: 25px; 
            transition: left 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform: translateX(-50%); 
            z-index: 5; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .car-label { 
            position: absolute; 
            top: -22px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 10px; 
            font-weight: bold;
            background: linear-gradient(135deg, #004d1a 0%, #051a0d 100%); 
            border: 1px solid var(--neon-green);
            padding: 3px 8px; 
            border-radius: 8px; 
            white-space: nowrap; 
            color: #fff; 
            box-shadow: 0 2px 10px rgba(0,255,102,0.2);
        }

        .obstacle { 
            font-size: 38px; 
            position: absolute; 
            transform: translateX(-50%); 
            z-index: 2; 
            filter: drop-shadow(0 5px 5px rgba(255,51,51,0.3));
        }

        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            margin-top: 15px; 
            width: 100%;
        }

        .btn { 
            background: linear-gradient(135deg, #004d1a 0%, #001a06 100%); 
            border: 2px solid var(--neon-green); 
            color: var(--neon-green); 
            padding: 18px 0; 
            width: 40%;
            font-size: 20px; 
            font-weight: 900;
            border-radius: 40px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active { 
            transform: scale(0.92); 
            box-shadow: 0 0 20px var(--neon-green);
            background: var(--neon-green);
            color: #000;
        }

        .game-over-screen { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(2, 11, 5, 0.95); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }

        .hidden { 
            display: none !important; 
        }

        .restart-btn { 
            background: linear-gradient(135deg, #004d1a 0%, #001a06 100%); 
            border: 2px solid var(--neon-green); 
            color: var(--neon-green); 
            padding: 15px 35px; 
            font-size: 18px; 
            font-weight: 900;
            border-radius: 30px; 
            cursor: pointer; 
            margin-top: 15px; 
            box-shadow: 0 0 15px rgba(0,255,102,0.2);
        }
        
        .restart-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="header">
        <div>⏱️ <span id="score">0</span> m</div>
        <div>👥 Canlı: <span id="online-count" style="color: var(--neon-green);">1</span></div>
    </div>

    <div class="track" id="track">
        <div id="player" class="car" style="left: 50%;">
            <div class="car-label" style="border-color: var(--gold-glow); color: var(--gold-glow);">SƏN</div>🏎️
        </div>

        <div id="game-over" class="game-over-screen hidden">
            <h1 style="color: var(--neon-red); margin: 0; font-size: 32px; text-shadow: 0 0 15px var(--neon-red);">💥 DIQQƏT QƏZA!</h1>
            <p style="font-size: 22px; color: #fff; margin: 15px 0;">Məsafəniz: <span id="final-score" style="color: var(--gold-glow); font-weight: 900;">0</span> metr</p>
            <button class="restart-btn" onclick="location.reload()">YENİDƏN QOŞUL 🔄</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="moveLeft()">⬅️ SOL</button>
        <button class="btn" onclick="moveRight()">SAĞ ➡️</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const socket = io("https://bearbee-production.up.railway.app"); 
        
        let score = 0;
        let player = document.getElementById('player');
        let track = document.getElementById('track');
        let gameOverScreen = document.getElementById('game-over');
        
        let playerPos = 50; 
        let isGameOver = false;
        let otherPlayers = {};
        let username = tg.initDataUnsafe?.user?.first_name || "Oyunçu";

        socket.on('connect', () => {
            socket.emit('joinGame', { username: username });
        });

        socket.on('updatePlayers', (serverPlayers) => {
            document.getElementById('online-count').innerText = Object.keys(serverPlayers).length;
            
            for (let id in serverPlayers) {
                if (id !== socket.id && !otherPlayers[id]) {
                    let enemyCar = document.createElement('div');
                    enemyCar.className = 'car';
                    enemyCar.id = 'player-' + id;
                    enemyCar.style.left = serverPlayers[id].x + '%';
                    enemyCar.innerHTML = `<div class="car-label">${serverPlayers[id].username}</div>🚗`;
                    track.appendChild(enemyCar);
                    otherPlayers[id] = enemyCar;
                }
            }
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].style.left = data.x + '%';
            }
        });

        socket.on('playerExploded', (id) => {
            if (otherPlayers[id]) {
                otherPlayers[id].innerHTML = `<div class="car-label" style="border-color:var(--neon-red); color:var(--neon-red);">💥 QƏZA</div>💥`;
            }
            if (id === socket.id) {
                isGameOver = true;
                gameOverScreen.classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        });

        socket.on('playerLeft', (id) => {
            if (otherPlayers[id]) {
                otherPlayers[id].remove();
                delete otherPlayers[id];
            }
            document.getElementById('online-count').innerText = Object.keys(otherPlayers).length + 1;
        });

        function moveLeft() {
            if (!isGameOver && playerPos > 20) { 
                playerPos -= 30; 
                player.style.left = playerPos + '%'; 
                socket.emit('move', { x: playerPos }); 
            }
        }

        function moveRight() {
            if (!isGameOver && playerPos < 80) { 
                playerPos += 30; 
                player.style.left = playerPos + '%'; 
                socket.emit('move', { x: playerPos }); 
            }
        }

        setInterval(() => {
            if(!isGameOver) {
                score += 1;
                document.getElementById('score').innerText = score;
            }
        }, 150);

        function spawnObstacle() {
            if(isGameOver) return;
            let obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            
            // Premium kiber maneələr: Asteroid, Enerji bombası və ya Kiber Daş
            const obstaclesList = ['🪨', '⚡', '☄️'];
            obstacle.innerText = obstaclesList[Math.floor(Math.random() * obstaclesList.length)];
            
            const positions = [20, 50, 80];
            obstacle.style.left = positions[Math.floor(Math.random() * positions.length)] + '%';
            obstacle.style.top = '-40px';
            track.appendChild(obstacle);
            
            let fall = setInterval(() => {
                if(isGameOver) { clearInterval(fall); return; }
                let top = parseInt(obstacle.style.top || -40);
                obstacle.style.top = (top + 7) + 'px'; // Sürət bir az artırıldı rəqabət üçün
                
                let obsRect = obstacle.getBoundingClientRect();
                let playerRect = player.getBoundingClientRect();

                if (
                    obsRect.bottom >= playerRect.top + 15 &&
                    obsRect.top <= playerRect.bottom - 15 &&
                    obsRect.right >= playerRect.left + 10 &&
                    obsRect.left <= playerRect.right - 10
                ) {
                    socket.emit('playerDied'); 
                    clearInterval(fall);
                }

                if (top > track.offsetHeight) { obstacle.remove(); clearInterval(fall); }
            }, 20);
        }
        setInterval(spawnObstacle, 900);

        tg.ready();
        tg.expand();
    </script>
</body>
</html>
