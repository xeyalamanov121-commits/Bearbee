<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Bearbee Cyber Empire</title>
    <style>
        body { background: #050505; color: #ffd700; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .screen { display: none; margin-bottom: 80px; }
        .active { display: block; }
        
        /* Düymələr üçün panel (aşağıda yan-yana) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; padding: 15px 0; display: flex; justify-content: space-around; border-top: 2px solid #ffd700; }
        .nav-btn { background: none; border: none; color: #ffd700; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        .main-tapper { font-size: 100px; margin: 50px 0; cursor: pointer; }
        .room-btn { display: block; width: 80%; margin: 10px auto; padding: 15px; background: #222; border: 1px solid #ffd700; color: #ffd700; border-radius: 10px; }
    </style>
</head>
<body>

<div id="tapper" class="screen active">
    <h3>Xal: <span id="user-points">0</span></h3>
    <div class="main-tapper" onclick="tap()">🐝</div>
    <button onclick="showAd()">Reklama bax (+100)</button>
</div>

<div id="race" class="screen">
    <h3>Yarış Otaqları</h3>
    <button class="room-btn" onclick="enterRace(0.40)">0.40 TON Otağı</button>
    <button class="room-btn" onclick="enterRace(1.00)">1.00 TON Otağı</button>
</div>

<div id="wallet" class="screen">
    <h3>Mənim Cüzdanım</h3>
    <p>Balans: <span id="user-balance">0</span> TON</p>
    <div style="background: #222; padding: 15px; border-radius: 10px;">
        EQD14kgmngE0fNYVs7_9dw78V3rPhNt7_Ee-7X3ykDORQvMp
    </div>
    <p><small>Depozit üçün bu ünvana göndərin</small></p>
</div>

<div class="bottom-nav">
    <button class="nav-btn" onclick="showScreen('tapper')">TAPPER</button>
    <button class="nav-btn" onclick="showScreen('race')">YARIŞ</button>
    <button class="nav-btn" onclick="showScreen('wallet')">CÜZDAN</button>
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function tap() {
        let p = parseInt(document.getElementById('user-points').innerText) + 1;
        document.getElementById('user-points').innerText = p;
    }

    function enterRace(min) {
        alert("Yarışa girmək üçün balansınız yoxlanılır...");
    }
</script>
</body>
</html>
