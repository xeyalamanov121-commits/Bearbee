<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Cyber Race - Track</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.3"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        :root {
            --neon-green: #00ff66;
            --neon-blue: #00ffff;
            --neon-red: #ff0055;
            --neon-gold: #ffcc00;
            --dark-bg: #050a08;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow: hidden;
            padding: 15px;
        }

        /* Üst Panel */
        .race-header {
            width: 100%;
            max-width: 480px;
            background: rgba(10, 20, 15, 0.95);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .room-title {
            font-size: 14px;
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .race-status {
            font-size: 12px;
            color: #aaa;
        }

        /* Oyun Sahəsi (Yarış Yolu) */
        .canvas-container {
            width: 100%;
            max-width: 480px;
            background: #111;
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.15);
            overflow: hidden;
            margin: 15px 0;
        }

        canvas {
            display: block;
            width: 100%;
            background: #141916;
        }

        /* İdarəetmə Düyməsi */
        .control-panel {
            width: 100%;
            max-width: 480px;
            margin-bottom: 20px;
        }

        .gas-btn {
            width: 100%;
            padding: 25px;
            background: linear-gradient(180deg, #00ff66 0%, #003311 100%);
            border: 2px solid #fff;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 255, 102, 0.4);
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            transition: transform 0.05s;
            touch-action: manipulation;
        }

        .gas-btn:active {
            transform: scale(0.96);
            background: linear-gradient(180deg, #00cc52 0%, #001a09 100%);
        }

        .gas-btn:disabled {
            background: #333 !important;
            border-color: #555;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="race-header">
        <div class="room-title" id="room-lbl">KİBER ÖTÜŞMƏ // OTAQ: ----</div>
        <div class="race-status" id="status-lbl">Sistem yüklənir, gözləyin...</div>
    </div>

    <div class="canvas-container">
        <canvas id="raceCanvas" width="480" height="320"></canvas>
    </div>

    <div class="control-panel">
        <button class="gas-btn" id="gas-pedal" disabled>QAZA BAS 🏎️</button>
    </div>

    <script>
        let tg = window.Telegram?.WebApp || null;
        
        // ⚠️ CANLIYA ÇIXARDIQDAN SONRA BU URL-İ ÖZ RENDER/RAILWAY KEÇİDİNİZLƏ DƏYİŞİN!
        const BACKEND_URL = "https://bearbee.vercel.app";
        const socket = io(BACKEND_URL);

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'test_room';
        let userId = urlParams.get('userId');
        
        if (!userId && tg && tg.initDataUnsafe?.user?.id) {
            userId = tg.initDataUnsafe.user.id.toString();
        } else if (!userId) {
            userId = "player_" + Math.floor(Math.random() * 100000);
        }

        document.getElementById('room-lbl').innerText = `KİBER ÖTÜŞMƏ // OTAQ: ${roomId.replace('cyber_room_', '')}`;

        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        const gasBtn = document.getElementById('gas-pedal');
        const statusLbl = document.getElementById('status-lbl');

        let raceState = {
            gameActive: false,
            countdown: 3,
            players: {}
        };

        const laneColors = ["#00ff66", "#00ffff", "#ff0055", "#ffcc00"];

        // Otağa daxil oluruq
        socket.emit('join_race_track', { room: roomId, userId: userId });

        socket.on('race_state_update', (serverState) => {
            raceState.players = serverState.players;
            drawTrack();
        });

        // Geri sayım
        socket.on('race_countdown', (count) => {
            raceState.countdown = count;
            if (count > 0) {
                statusLbl.innerText = `Hazırlaşın! Yarışın başlamasına: ${count}`;
            } else {
                statusLbl.innerText = `YARIŞ BAŞLADI! SÜRÜN! 🏁`;
                raceState.gameActive = true;
                gasBtn.disabled = false;
            }
            drawTrack();
        });

        // Klikləmə/Toxunma hadisələri
        gasBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pushCar(); });
        gasBtn.addEventListener('click', (e) => { e.preventDefault(); pushCar(); });

        function pushCar() {
            if (!raceState.gameActive) return;
            socket.emit('gas_press', { room: roomId, userId: userId });
        }

        // Yarış bitdikdə
        socket.on('race_finished', (data) => {
            raceState.gameActive = false;
            gasBtn.disabled = true;
            
            if (data.winnerId === userId) {
                statusLbl.innerText = `🏆 TƏBRİKLƏR! SİZ QALİB GƏLDİNİZ! (+1000 Data)`;
                localStorage.setItem("race_bonus_reward", "1000");
            } else {
                statusLbl.innerText = `Finiş! Qalib: @${data.winnerName}. Siz uduzdunuz.`;
            }

            // 4 saniyə sonra əsas səhifəyə qaytarırıq
            setTimeout(() => {
                window.location.href = "index.html"; 
            }, 4000);
        });

        // Kanvas üzərində vizualların çəkilməsi
        function drawTrack() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const laneHeight = canvas.height / 4;
            
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = i % 2 === 0 ? "#141916" : "#1a211d";
                ctx.fillRect(0, i * laneHeight, canvas.width, laneHeight);
                
                ctx.strokeStyle = "rgba(255,255,255,0.08)";
                ctx.lineWidth = 2;
                ctx.strokeRect(0, i * laneHeight, canvas.width, laneHeight);

                // Dama-dama finiş xətti
                let finishX = canvas.width - 40;
                ctx.fillStyle = "#fff";
                for (let j = 0; j < laneHeight; j += 10) {
                    if ((i + j/10) % 2 === 0) {
                        ctx.fillRect(finishX, i * laneHeight + j, 10, 10);
                        ctx.fillRect(finishX + 20, i * laneHeight + j, 10, 10);
                    } else {
                        ctx.fillRect(finishX + 10, i * laneHeight + j, 10, 10);
                    }
                }
            }

            // Maşınları zolaqlar üzrə çəkmək
            let index = 0;
            for (let sId in raceState.players) {
                let p = raceState.players[sId];
                let yPos = (index * laneHeight) + (laneHeight / 2);

                ctx.fillStyle = laneColors[index] || "#ffffff";
                let xPos = (p.x / 100) * (canvas.width - 80); 

                ctx.fillRect(xPos + 10, yPos - 12, 35, 24); 
                
                ctx.fillStyle = "#fff";
                ctx.fillRect(xPos + 40, yPos - 10, 5, 4);
                ctx.fillRect(xPos + 40, yPos + 6, 5, 4);

                ctx.fillStyle = "#888";
                ctx.font = "10px sans-serif";
                ctx.fillText(p.name || "Player", xPos + 10, yPos - 18);

                index++;
            }

            // Ekrandakı böyük geri sayım
            if (raceState.countdown > 0) {
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#ffcc00";
                ctx.font = "bold 50px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(raceState.countdown, canvas.width / 2, canvas.height / 2);
                ctx.textAlign = "start"; 
                ctx.textBaseline = "alphabetic"; 
            }
        }

        window.onload = () => { drawTrack(); };
    </script>
</body>
</html>
