<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Premium Canlı Yarış</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --neon-green: #00ff66; --neon-red: #ff3333; --gold-glow: #ffd700; --premium-dark: #020b05; }
        body { margin: 0; background: radial-gradient(circle at center, #0a3a1f 0%, var(--premium-dark) 100%); color: #fff; text-align: center; font-family: 'Poppins', sans-serif; overflow: hidden; user-select: none; }
        .header { padding: 15px; font-size: 18px; font-weight: 900; color: var(--gold-glow); background: linear-gradient(135deg, #0d381e 0%, #051a0d 100%); border-bottom: 2px solid var(--gold-glow); display: flex; justify-content: space-around; align-items: center; }
        .track { width: 92%; max-width: 400px; height: 52vh; background: rgba(4, 23, 12, 0.85); margin: 20px auto; position: relative; border: 2px solid var(--neon-green); border-radius: 24px; overflow: hidden; }
        .car { font-size: 45px; position: absolute; bottom: 25px; transition: left 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateX(-50%); z-index: 5; }
        .car-label { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: bold; background: #004d1a; border: 1px solid var(--neon-green); padding: 3px 8px; border-radius: 8px; white-space: nowrap; color: #fff; }
        .obstacle { font-size: 38px; position: absolute; transform: translateX(-50%); z-index: 2; }
        .btn { background: linear-gradient(135deg, #004d1a 0%, #001a06 100%); border: 2px solid var(--neon-green); color: var(--neon-green); padding: 18px 0; width: 40%; font-size: 20px; font-weight: 900; border-radius: 40px; cursor: pointer; }
        .game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 11, 5, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .hidden { display: none !important; }
        .restart-btn { background: linear-gradient(135deg, #004d1a 0%, #001a06 100%); border: 2px solid var(--neon-green); color: var(--neon-green); padding: 15px 35px; font-size: 18px; font-weight: 900; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div>⏱️ <span id="score">0</span> m</div>
        <div id="winner-msg" style="color:var(--gold-glow); font-size: 14px;">Yarış gedir...</div>
    </div>

    <div class="track" id="track">
        <div id="player" class="car" style="left: 50%;"><div class="car-label">SƏN</div>🏎️</div>
        <div id="game-over" class="game-over-screen hidden">
            <h1 style="color: var(--neon-red);">💥 QƏZA!</h1>
            <p style="font-size: 20px;">Xalınız: <span id="final-score" style="color:gold;">0</span></p>
            <button class="restart-btn" onclick="restartGame()">YENİDƏN BAŞLA 🔄</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="moveLeft()">⬅️ SOL</button>
        <button class="btn" onclick="moveRight()">SAĞ ➡️</button>
    </div>

    <script>
        const socket = io("https://bearbee-production.up.railway.app");
        let score = 0, playerPos = 50, isGameOver = false;
        const player = document.getElementById('player');
        const username = window.Telegram.WebApp.initDataUnsafe?.user?.first_name || "Oyunçu";

        socket.on('connect', () => socket.emit('joinGame', { username }));
        
        socket.on('gameResult', (msg) => {
            document.getElementById('winner-msg').innerText = msg;
        });

        socket.on('playerExploded', (id) => {
            if(id === socket.id) {
                isGameOver = true;
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over').classList.remove('hidden');
            }
        });

        function restartGame() {
            score = 0; isGameOver = false;
            document.getElementById('score').innerText = '0';
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('winner-msg').innerText = "Yarış gedir...";
            socket.emit('joinGame', { username });
            document.querySelectorAll('.obstacle').forEach(o => o.remove());
        }

        setInterval(() => {
            if(!isGameOver) {
                score++;
                document.getElementById('score').innerText = score;
                socket.emit('updateScore', score);
            }
        }, 200);

        function spawnObstacle() {
            if(isGameOver) return;
            let obs = document.createElement('div'); obs.className = 'obstacle'; obs.innerText = '🪨';
            obs.style.left = [20, 50, 80][Math.floor(Math.random()*3)] + '%'; obs.style.top = '-40px';
            document.getElementById('track').appendChild(obs);
            
            let fall = setInterval(() => {
                if(isGameOver) { clearInterval(fall); return; }
                let top = parseInt(obs.style.top || -40);
                obs.style.top = (top + 5) + 'px';
                
                let pR = player.getBoundingClientRect(), oR = obs.getBoundingClientRect();
                if(oR.bottom > pR.top+25 && oR.top < pR.bottom-25 && oR.right > pR.left+18 && oR.left < pR.right-18) {
                    socket.emit('playerDied');
                    clearInterval(fall);
                }
                if (top > 400) { obs.remove(); clearInterval(fall); }
            }, 20);
        }
        setInterval(spawnObstacle, 1300);

        function moveLeft() { if (!isGameOver && playerPos > 20) { playerPos -= 30; player.style.left = playerPos + '%'; } }
        function moveRight() { if (!isGameOver && playerPos < 80) { playerPos += 30; player.style.left = playerPos + '%'; } }
    </script>
</body>
</html>
