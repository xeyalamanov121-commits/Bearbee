<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee CANLI Çoxoyunçulu Yarış</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #020b05; 
            color: #fff; 
            text-align: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            user-select: none; 
        }
        .header { 
            padding: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            color: #ffd700; 
            background: rgba(4, 23, 12, 0.9); 
            border-bottom: 2px solid #00ff66; 
        }
        .track { 
            width: 100%; 
            max-width: 400px; 
            height: 55vh; 
            background: #111; 
            margin: 10px auto; 
            position: relative; 
            border-left: 3px dashed #00ff66; 
            border-right: 3px dashed #00ff66; 
            overflow: hidden; 
        }
        .car { 
            font-size: 40px; 
            position: absolute; 
            bottom: 20px; 
            transition: left 0.1s ease-out; 
            transform: translateX(-50%); 
            z-index: 5; 
        }
        .car-label { 
            position: absolute; 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 11px; 
            background: rgba(0,0,0,0.7); 
            padding: 2px 5px; 
            border-radius: 5px; 
            white-space: nowrap; 
            color: #fff; 
        }
        .obstacle { 
            font-size: 35px; 
            position: absolute; 
            transform: translateX(-50%); 
            z-index: 2; 
        }
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-top: 10px; 
        }
        .btn { 
            background: #004d1a; 
            border: 2px solid #00ff66; 
            color: #00ff66; 
            padding: 15px 35px; 
            font-size: 22px; 
            border-radius: 20px; 
            cursor: pointer; 
        }
        .btn:active { 
            transform: scale(0.95); 
        }
        .game-over-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }
        .hidden { 
            display: none !important; 
        }
        .restart-btn { 
            background: #004d1a; 
            border: 2px solid #00ff66; 
            color: #00ff66; 
            padding: 12px 25px; 
            font-size: 18px; 
            border-radius: 15px; 
            cursor: pointer; 
            margin-top: 15px; 
        }
    </style>
</head>
<body>

    <div class="header">⏱️ Sənin Məsafən: <span id="score">0</span> m | 👥 Onlayn: <span id="online-count">1</span></div>

    <div class="track" id="track">
        <div id="player" class="car" style="left: 50%;">
            <div class="car-label">Sən</div>🏎️
        </div>

        <div id="game-over" class="game-over-screen hidden">
            <h1 style="color: #ff3333; margin: 0;">💥 TOQQOŞDUNUZ!</h1>
            <p style="font-size: 20px;">Xalınız: <span id="final-score">0</span> metr</p>
            <button class="restart-btn" onclick="location.reload()">Yenidən Qoşul 🔄</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="moveLeft()">⬅️ SOL</button>
        <button class="btn" onclick="moveRight()">SAĞ ➡️</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        // Sizin canlı Railway server linkiniz
        const socket = io("https://bearbee-production.up.railway.app"); 
        
        let score = 0;
        let player = document.getElementById('player');
        let track = document.getElementById('track');
        let gameOverScreen = document.getElementById('game-over');
        
        let playerPos = 50; 
        let isGameOver = false;
        let otherPlayers = {};
        let username = tg.initDataUnsafe?.user?.first_name || "Oyunçu";

        // Serverə qoşulma xəbəri göndəririk
        socket.on('connect', () => {
            socket.emit('joinGame', { username: username });
        });

        // Aktiv oyunçuların siyahısı yenilənəndə
        socket.on('updatePlayers', (serverPlayers) => {
            document.getElementById('online-count').innerText = Object.keys(serverPlayers).length;
            
            // Yeni gələn oyunçuları ekrana əlavə et
            for (let id in serverPlayers) {
                if (id !== socket.id && !otherPlayers[id]) {
                    let enemyCar = document.createElement('div');
                    enemyCar.className = 'car';
                    enemyCar.id = 'player-' + id;
                    enemyCar.style.left = serverPlayers[id].x + '%';
                    enemyCar.innerHTML = `<div class="car-label">${serverPlayers[id].username}</div>🚗`;
                    track.appendChild(enemyCar);
                    otherPlayers[id] = enemyCar;
                }
            }
        });

        // Hər hansı bir rəqib sağa-sola hərəkət edəndə
        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].style.left = data.x + '%';
            }
        });

        // Bir rəqib partlayanda onun emojisini dəyişirik
        socket.on('playerExploded', (id) => {
            if (otherPlayers[id]) {
                otherPlayers[id].innerHTML = `<div class="car-label">💥 ÖLDÜ</div>💥`;
            }
            if (id === socket.id) {
                isGameOver = true;
                gameOverScreen.classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        });

        // Oyunçu çıxanda onu ekrandan sil
        socket.on('playerLeft', (id) => {
            if (otherPlayers[id]) {
                otherPlayers[id].remove();
                delete otherPlayers[id];
            }
            document.getElementById('online-count').innerText = Object.keys(otherPlayers).length + 1;
        });

        // Sola hərəkət məntiqi
        function moveLeft() {
            if (!isGameOver && playerPos > 20) { 
                playerPos -= 30; 
                player.style.left = playerPos + '%'; 
                socket.emit('move', { x: playerPos }); // Serverə bildir
            }
        }

        // Sağa hərəkət məntiqi
        function moveRight() {
            if (!isGameOver && playerPos < 80) { 
                playerPos += 30; 
                player.style.left = playerPos + '%'; 
                socket.emit('move', { x: playerPos }); // Serverə bildir
            }
        }

        // Xal artımı (Metr hesabı)
        setInterval(() => {
            if(!isGameOver) {
                score += 1;
                document.getElementById('score').innerText = score;
            }
        }, 150);

        // Yerli obyekt (Maneə) yaratma və toqquşma yoxlanışı
        function spawnObstacle() {
            if(isGameOver) return;
            let obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.innerText = '🪨';
            
            const positions = [20, 50, 80];
            obstacle.style.left = positions[Math.floor(Math.random() * positions.length)] + '%';
            obstacle.style.top = '-40px';
            track.appendChild(obstacle);
            
            let fall = setInterval(() => {
                if(isGameOver) { clearInterval(fall); return; }
                let top = parseInt(obstacle.style.top || -40);
                obstacle.style.top = (top + 6) + 'px';
                
                let obsRect = obstacle.getBoundingClientRect();
                let playerRect = player.getBoundingClientRect();

                if (
                    obsRect.bottom >= playerRect.top + 15 &&
                    obsRect.top <= playerRect.bottom - 15 &&
                    obsRect.right >= playerRect.left + 10 &&
                    obsRect.left <= playerRect.right - 10
                ) {
                    socket.emit('playerDied'); // Serverə öldüyümüzü xəbər veririk
                    clearInterval(fall);
                }

                if (top > track.offsetHeight) { obstacle.remove(); clearInterval(fall); }
            }, 20);
        }
        setInterval(spawnObstacle, 1000);

        tg.ready();
        tg.expand();
    </script>
</body>
</html>
