<!DOCTYPE html>
<html lang="az">
<body style="background:#000; color:#ffd700; text-align:center; padding-top:50px;">
    <h1>MINING ARENA</h1>
    <h2 id="scoreDisplay">XAL: 0</h2>
    <div onclick="tap()" style="font-size:100px; cursor:pointer;">🐻</div>
    <script src="config.js"></script>
    <script>
        let score = 0;
        function tap() {
            score += 2;
            document.getElementById('scoreDisplay').innerText = "XAL: " + score;
            if(score % 400 === 0) alert("REKLAM VAXTI! 400 xala çatdın.");
        }
    </script>
</body>
</html>
