<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Premium Tapper</title>
    <style>
        body { 
            margin: 0; background: #050505; color: #ffd700; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }
        #ui { position: absolute; top: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        #bear-container { 
            position: relative; width: 280px; height: 280px; margin: 40px auto; 
            cursor: pointer; transform-style: preserve-3d; transition: transform 0.1s; 
        }
        #bear { 
            width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid #ffd700; box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #ffd700 0%, #1a1a1a 100%);
            display: flex; align-items: center; justify-content: center; font-size: 80px;
        }
        /* Vizual Parçalanma Effekti (Particle) */
        .particle { position: absolute; background: #ffd700; pointer-events: none; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui">XAL: 0 / 100,000</div>
    <div id="bear-container" onmousedown="tap(event)" ontouchstart="tap(event)">
        <div id="bear">🐻</div>
    </div>

    <script>
        const ui = document.getElementById('ui');
        const bearContainer = document.getElementById('bear-container');
        let score = 0;

        function tap(e) {
            if (score >= 100000) return;

            // 1. Premium Hissiyat (Mobil Haptic Feedback)
            // Bu yalnız mobil tətbiqlərdə və bəzi mobil brauzerlərdə işləyir.
            if ('vibrate' in navigator) { navigator.vibrate(20); } 

            // 2. Klikdə Vizual Böyümə/Kiçilmə (Hamster effekti)
            bearContainer.style.transform = 'scale(0.95) translateZ(-10px)';
            setTimeout(() => bearContainer.style.transform = 'scale(1)', 100);

            // 3. Zərrəcə Effektləri (Particle Generation)
            const rect = bearContainer.getBoundingClientRect();
            for (let i = 0; i < 5; i++) {
                createParticle(e.clientX || e.touches[0].clientX - rect.left, e.clientY || e.touches[0].clientY - rect.top);
            }

            // 4. Xal hesabı
            score += 2;
            ui.innerText = `XAL: ${score} / 100,000`;
            if (score >= 100000) alert("Təbriklər! Sən artıq çıxarış edə bilərsən!");
        }

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 8 + 4 + 'px';
            p.style.height = p.style.width;
            p.style.left = x + 'px'; p.style.top = y + 'px';
            bearContainer.appendChild(p);

            // Animasiya (Zərrəcənin uçması)
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 50 + 20;
            const dx = Math.cos(angle) * dist; const dy = Math.sin(angle) * dist;

            p.animate([
                { transform: 'translate(0, 0)', opacity: 1 },
                { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
            ], { duration: Math.random() * 500 + 300, easing: 'ease-out' }).onfinish = () => p.remove();
        }
    </script>
</body>
</html>
