<!DOCTYPE html>
<html lang="az">
<body>
    <h1 id="score">XAL: 0</h1>
    <div id="bear" style="font-size:100px; cursor:pointer;" onclick="tap()">🐻</div>
    <script>
        let score = 0;
        let milestone = 400;
        function tap() {
            score += 2;
            document.getElementById('score').innerText = "XAL: " + score;
            if(score >= milestone) {
                alert("Reklam vaxtı!"); // Burada reklam kodunu çağır
                milestone += 400;
            }
        }
    </script>
</body>
</html>
