<!DOCTYPE html>
<html lang="az">
<body style="background:#000; color:#fff; text-align:center; padding:50px;">
    <h1>RACE ROOM</h1>
    <div id="roomStatus">1 TON depozit et və otağa qoşul.</div>
    <button onclick="join()" style="padding:15px 30px; background:#ffd700; border:none; border-radius:10px; font-weight:bold;">OTAĞA QOŞUL</button>
    <script src="config.js"></script>
    <script>
        async function join() {
            const { data, error } = await supabase.from('rooms').insert([{ status: 'waiting', player_count: 1 }]);
            document.getElementById('roomStatus').innerText = "Oyunçu axtarılır... (1/3)";
            // Burada Realtime (canlı) izləmə ilə 3 nəfər dolanda başlama funksiyası aktivləşir
        }
    </script>
</body>
</html>
