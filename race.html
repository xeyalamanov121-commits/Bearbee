<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Yarış Arenası</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 10px; text-align: center; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; }
        #game-area { width: 100%; height: 300px; background: #111; border: 2px solid #333; margin-top: 20px; display: none; position: relative; }
        .car { font-size: 40px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

    <h1 style="text-align: center;">🏎️ YARIŞ ARENASI</h1>

    <div id="rooms">
        <div class="card" onclick="enterRoom(0.40)"><h3>Otaq: 0.40 TON</h3></div>
        <div class="card" onclick="enterRoom(1.00)"><h3>Otaq: 1.00 TON</h3></div>
        <div class="card" onclick="window.location.href='index.html'"><h3>🔙 Ana Səhifə</h3></div>
    </div>

    <div id="game-area">
        <div id="player" class="car">🏎️</div>
    </div>

    <script>
        function enterRoom(price) {
            document.getElementById('rooms').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            alert(price + " TON otağına daxil oldunuz!");
        }
    </script>
</body>
</html>
