<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bearbee Poker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="table">

  <div class="top-player player">
    <div class="name">Player 2</div>
    <div class="cards">
      <div class="card back"></div>
      <div class="card back"></div>
    </div>
  </div>

  <div class="center">
    <div class="community">
      <div class="card">A♠</div>
      <div class="card">K♥</div>
      <div class="card">10♣</div>
      <div class="card">7♦</div>
      <div class="card">2♠</div>
    </div>

    <div class="pot">
      Pot: 1200
    </div>
  </div>

  <div class="bottom-player player">
    <div class="name">You</div>

    <div class="cards">
      <div class="card">Q♠</div>
      <div class="card">Q♥</div>
    </div>

    <div class="actions">
      <button>Fold</button>
      <button>Call</button>
      <button>Raise</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
