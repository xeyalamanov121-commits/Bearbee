<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Premium</title>
    <script src="https://sad.adsgram.ai/js/adsgram-telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Şəkildəki kimi tünd meşə yaşılı və qara keçidli premium fon */
            background: linear-gradient(180deg, #0b2914 0%, #05140a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            text-align: center;
            user-select: none;
            overflow: hidden;
        }

        .container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Loqo və Başlıq Hissəsi */
        .header {
            margin-top: 10px;
        }
        .logo {
            font-size: 45px;
            margin: 0;
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 2px 0;
            background: linear-gradient(135deg, #ffe082 0%, #ffb300 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 14px;
            color: #81c784;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        /* Şəkildəki 3-lü Premium Grid Panel */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 92%;
            margin-top: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            padding: 10px 5px;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
        }

        .stat-label {
            font-size: 11px;
            color: #a5d6a7;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .gold-text {
            color: #ffd54f;
        }

        /* Oyun Sahəsi (Premium Ayı və Arı) */
        .game-area {
            position: relative;
            width: 100%;
            height: 35vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bear-display {
            font-size: 110px;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .bear-display:active {
            transform: scale(1.15);
        }

        .bee-display {
            position: absolute;
            font-size: 38px;
            left: 25%;
            top: 20%;
            transition: all 0.6s ease-in-out;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Şəkildəki İldırımlı Yaşıl Enerji Barı */
        .energy-section {
            width: 88%;
        }

        .energy-title {
            font-size: 13px;
            color: #e8f5e9;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .energy-container {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #2e7d32;
            border-radius: 30px;
            height: 24px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
            display: flex;
            align-items: center;
        }

        .energy-bar-fill {
            background: linear-gradient(90deg, #4caf50 0%, #81c784 50%, #4caf50 100%);
            height: 100%;
            width: 100%;
            border-radius: 30px;
            transition: width 0.3s ease;
            box-shadow: 0 0 12px #4caf50;
        }

        /* İldırım İkonu */
        .bolt-icon {
            position: absolute;
            left: 10px;
            font-size: 14px;
            color: #fff;
            z-index: 2;
            text-shadow: 0 0 5px #fff;
            animation: pulse 1s infinite alternate;
        }

        /* Şəkildəki Qızılı Premium Düymələr */
        .controls {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .premium-btn {
            background: linear-gradient(135deg, #b58d3d 0%, #866323 100%);
            border: 1px solid #ffd700;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            padding: 15px 0;
            width: 85%;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.2);
            transition: transform 0.1s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .premium-btn:active {
            transform: scale(0.98);
        }

        /* Video Düyməsi (Şəkildəki alt sətir dizaynı) */
        .video-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px dashed rgba(255, 215, 0, 0.4);
            color: #ffe082;
            font-size: 14px;
        }

        .hidden { display: none !important; }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">👑</div>
        <h1 class="title">Bearbee Premium</h1>
        <p class="subtitle">Meşə İqtisadiyyatı</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Balans</div>
            <div class="stat-value gold-text"><span id="honey-val">0</span> 🍯</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Status</div>
            <div class="stat-value" style="color: #ffd54f;">⭐ VIP</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Xoşbəxtlik</div>
            <div class="stat-value" style="color: #ff5252;">❤️ <span id="weight-val">10</span></div>
        </div>
    </div>

    <div class="game-area">
        <div id="bee-obj" class="bee-display">🐝</div>
        <div id="bear-obj" class="bear-display" onclick="ayiniYedizdir()">🐻</div>
    </div>

    <div class="energy-section">
        <div class="energy-title">Enerji (<span id="energy-num">100</span>/100)</div>
        <div class="energy-container">
            <span class="bolt-icon">⚡</span>
            <div id="energy-fill" class="energy-bar-fill"></div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-honey" class="premium-btn" onclick="balTopla()">🐝 Maksimum Sürətlə Bal Topla</button>
        <button id="btn-feed" class="premium-btn" onclick="ayiniYedizdir()" style="background: linear-gradient(135deg, #a6621e 0%, #6d3b0d 100%); border-color: #ff9800;">🍯 Ayını Yedizdir (50 Bal)</button>
        <button id="btn-video" class="premium-btn video-btn hidden" onclick="reklamIzle()">🎬 Video İzlə - 2X Enerji Qazan</button>
    </div>
</div>

<script>
    let honey = 0;
    let bearWeight = 10;
    let energy = 100;
    let feedCount = 0;

    const ADSGRAM_BLOCK_ID = "YOUR_ADSGRAM_BLOCK_ID";
    let AdController = window.Adsgram ? window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID }) : null;

    function updateGameUI() {
        document.getElementById('honey-val').innerText = honey;
        document.getElementById('weight-val').innerText = bearWeight;
        document.getElementById('energy-num').innerText = energy;
        document.getElementById('energy-fill').style.width = energy + "%";

        if (energy < 10) {
            document.getElementById('btn-honey').classList.add('hidden');
            document.getElementById('btn-video').classList.remove('hidden');
        } else {
            document.getElementById('btn-honey').classList.remove('hidden');
            document.getElementById('btn-video').classList.add('hidden');
        }
    }

    function balTopla() {
        if (energy >= 10) {
            energy -= 10;
            honey += Math.floor(Math.random() * 10) + 8; // Sürətli bal qazancı

            // Arının premium uçuş hərəkəti
            let bee = document.getElementById('bee-obj');
            bee.style.left = (Math.random() * 50 + 15) + "%";
            bee.style.top = (Math.random() * 40 + 10) + "%";

            updateGameUI();
        }
    }

    function ayiniYedizdir() {
        if (honey >= 50) {
            honey -= 50;
            bearWeight += 1;
            feedCount++;

            let bear = document.getElementById('bear-obj');
            bear.style.transform = "scale(1.25)";
            setTimeout(() => bear.style.transform = "scale(1)", 120);

            updateGameUI();

            // Sənin mürəkkəb reklam dövrün: Hər 3 dəfədə bir tam ekran reklam
            if (feedCount % 3 === 0) {
                if (AdController) AdController.show().catch(e => console.log(e));
            }
        } else {
            alert("🐻 Ayı acdır! Onu yedizdirmək üçün kifayət qədər balınız yoxdur.");
        }
    }

    function reklamIzle() {
        if (AdController) {
            AdController.show().then(() => {
                energy = 100;
                updateGameUI();
            }).catch(() => {
                energy = 100; // Test rejimində dərhal doldurur
                updateGameUI();
            });
        } else {
            energy = 100;
            updateGameUI();
        }
    }

    updateGameUI();
</script>

</body>
</html>
