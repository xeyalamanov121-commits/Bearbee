<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Ultimate Premium</title>
    <script src="https://sad.adsgram.ai/js/adsgram-telegram-web-app.js"></script>
    <style>
        :root {
            --neon-green: #00ff66;
            --gold-glow: #ffd700;
            --premium-dark: #020b05;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a3a1f 0%, var(--premium-dark) 100%);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            color: #fff;
            text-align: center;
            user-select: none;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            box-sizing: border-box;
        }

        /* 🌟 İşıldayan Neon Başlıq Paneli */
        .header-panel {
            background: linear-gradient(135deg, #0d381e 0%, #051a0d 100%);
            border: 2px solid var(--gold-glow);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.4), inset 0 0 15px rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 12px 30px;
            margin-top: 10px;
            animation: borderPulse 2s infinite alternate;
        }

        .header-title {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--gold-glow), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
            margin: 0;
        }

        /* 🔮 Cyber-Glass Göstərici Paneli */
        .status-card {
            background: rgba(4, 23, 12, 0.75);
            border: 1px solid rgba(0, 255, 102, 0.25);
            border-radius: 22px;
            width: 90%;
            padding: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 0 20px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(15px);
            margin-top: 5px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 17px;
            font-weight: 700;
            margin: 8px 0;
            letter-spacing: 0.5px;
        }

        .glow-text-green {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.8);
        }

        .glow-text-gold {
            color: var(--gold-glow);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* ⚡ İldırımlı və Plazmalı Enerji Barı */
        .energy-wrapper {
            width: 100%;
            margin-top: 15px;
        }

        .energy-container {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-green);
            border-radius: 30px;
            height: 26px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            display: flex;
            align-items: center;
        }

        .energy-bar-fill {
            background: linear-gradient(90deg, #006622, var(--neon-green), #00ffcc);
            background-size: 200% 100%;
            height: 100%;
            width: 100%;
            border-radius: 30px;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px var(--neon-green);
            animation: moveGradient 2s linear infinite;
        }

        .bolt {
            position: absolute;
            left: 14px;
            font-size: 14px;
            color: #fff;
            z-index: 3;
            text-shadow: 0 0 8px #fff, 0 0 15px var(--neon-green);
            animation: superFlash 0.5s infinite alternate;
        }

        /* 🐻 Oyun Sahəsi (Parıldayan Aura) */
        .game-area {
            position: relative;
            width: 100%;
            height: 35vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bear-avatar {
            font-size: 125px;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 30px rgba(0, 255, 102, 0.2)) drop-shadow(0 15px 35px rgba(0,0,0,0.7));
        }

        .bear-avatar:active {
            transform: scale(1.2) rotate(3deg);
        }

        .bee-avatar {
            position: absolute;
            font-size: 45px;
            left: 20%;
            top: 20%;
            transition: all 0.5s cubic-bezier(0.42, 0, 0.58, 1);
            filter: drop-shadow(0 0 15px var(--gold-glow));
        }

        /* 🚀 SON DƏRƏCƏ İŞILDAYAN 3D DÜYMƏLƏR */
        .control-panel {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .ultimate-btn {
            position: relative;
            background: linear-gradient(135deg, #004d1a 0%, #001a06 100%);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 17px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px 0;
            width: 88%;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3), inset 0 0 10px rgba(0, 255, 102, 0.2);
            overflow: hidden;
            transition: all 0.2s ease;
            text-shadow: 0 0 5px rgba(0,255,102,0.5);
        }

        /* Düymə üzərində hərəkət edən parlaq işıq dalğası (Shimmer) */
        .ultimate-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(30deg);
            transition: none;
            animation: shimmerEffect 2.5s infinite linear;
        }

        .ultimate-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
        }

        .btn-feed {
            background: linear-gradient(135deg, #4d2600 0%, #1a0d00 100%);
            border-color: var(--gold-glow);
            color: var(--gold-glow);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
        }

        .btn-feed::after {
            background: rgba(255, 215, 0, 0.3);
        }

        .btn-video {
            background: rgba(0, 255, 102, 0.05);
            border: 2px dashed #00ffff;
            color: #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            animation: pulseBlue 1.5s infinite alternate;
        }
        
        .btn-video::after { background: rgba(0, 255, 255, 0.3); }

        .hidden { display: none !important; }

        /* 🎭 ANIMASİYALAR */
        @keyframes borderPulse {
            from { box-shadow: 0 0 15px rgba(0, 255, 102, 0.4); border-color: var(--gold-glow); }
            to { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); border-color: var(--neon-green); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        @keyframes shimmerEffect {
            0% { left: -60%; }
            100% { left: 130%; }
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes superFlash {
            from { opacity: 0.5; transform: scale(0.9) rotate(-5deg); }
            to { opacity: 1; transform: scale(1.2) rotate(5deg); text-shadow: 0 0 15px #fff; }
        }

        @keyframes pulseBlue {
            from { box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); }
            to { box-shadow: 0 0 30px rgba(0, 255, 255, 0.6); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <h1 class="header-title">Bearbee Ultimate</h1>
    </div>

    <div class="status-card">
        <div class="status-row">
            <span>🍯 BALANS:</span>
            <span id="honey-display" class="glow-text-gold">0</span>
        </div>
        <div class="status-row">
            <span>🐻 AYI ÇƏKİSİ:</span>
            <span id="weight-display" class="glow-text-green">10 KG</span>
        </div>
        <div class="status-row" style="margin-bottom: 0;">
            <span>⚡ ARI ENERJİSİ:</span>
            <span id="energy-display" style="color: #00ffcc;">100/100</span>
        </div>
        
        <div class="energy-wrapper">
            <div class="energy-container">
                <span class="bolt">⚡</span>
                <div id="energy-bar" class="energy-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="game-area">
        <div id="bee-node" class="bee-avatar">🐝</div>
        <div id="bear-node" class="bear-avatar" onclick="ayiniYedizdir()">🐻</div>
    </div>

    <div class="control-panel">
        <button id="btn-collect" class="ultimate-btn" onclick="balTopla()">🐝 Sürətli Bal Topla</button>
        <button id="btn-feed" class="ultimate-btn btn-feed" onclick="ayiniYedizdir()">🍯 Ayını Yedizdir (50 Bal)</button>
        <button id="btn-video" class="ultimate-btn btn-video hidden" onclick="reklamIzle()">🎬 REKLAM İZLƏ - 2X ENERJİ</button>
    </div>
</div>

<script>
    let honey = 0;
    let bearWeight = 10;
    let energy = 100;
    let feedCount = 0;

    const ADSGRAM_BLOCK_ID = "YOUR_ADSGRAM_BLOCK_ID";
    let AdController = window.Adsgram ? window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID }) : null;

    function refreshUI() {
        document.getElementById('honey-display').innerText = honey;
        document.getElementById('weight-display').innerText = bearWeight + " KG";
        document.getElementById('energy-display').innerText = energy + "/100";
        document.getElementById('energy-bar').style.width = energy + "%";

        if (energy < 10) {
            document.getElementById('btn-collect').classList.add('hidden');
            document.getElementById('btn-video').classList.remove('hidden');
        } else {
            document.getElementById('btn-collect').classList.remove('hidden');
            document.getElementById('btn-video').classList.add('hidden');
        }
    }

    function balTopla() {
        if (energy >= 10) {
            energy -= 10;
            honey += Math.floor(Math.random() * 12) + 8; 

            let bee = document.getElementById('bee-node');
            bee.style.left = (Math.random() * 50 + 20) + "%";
            bee.style.top = (Math.random() * 30 + 20) + "%";

            refreshUI();
        }
    }

    function ayiniYedizdir() {
        if (honey >= 50) {
            honey -= 50;
            bearWeight += 1;
            feedCount++;

            let bear = document.getElementById('bear-node');
            bear.style.transform = "scale(1.25) rotate(-5deg)";
            setTimeout(() => bear.style.transform = "scale(1) rotate(0deg)", 120);

            refreshUI();

            if (feedCount % 3 === 0) {
                if (AdController) AdController.show().catch(e => console.log(e));
            }
        } else {
            alert("🐻 Kifayət qədər bal yoxdur! Öncə bal toplayın.");
        }
    }

    function reklamIzle() {
        if (AdController) {
            AdController.show().then(() => {
                energy = 100;
                refreshUI();
            }).catch(() => {
                energy = 100; 
                refreshUI();
            });
        } else {
            energy = 100;
            refreshUI();
        }
    }

    refreshUI();
</script>

</body>
</html>
