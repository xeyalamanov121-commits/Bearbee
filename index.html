<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Bearbee Gaming Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .hero { height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .balance-box { font-size: 24px; color: #ffd700; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:active { transform: scale(0.95); background: #222; }
        #admin-panel { display: none; background: #220; padding: 20px; margin: 20px; border: 2px solid #ff4500; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="balance-box">🍯 <span id="balance">0</span> TON</div>
        <div style="font-size: 80px; cursor: pointer;" onclick="tap()">🐻</div>
    </div>

    <div class="grid">
        <div class="card" onclick="tap()"><h3>Bal Topla</h3></div>
        <div class="card" onclick="showAd()"><h3>Reklam (+100)</h3></div>
        <div class="card" onclick="upgrade()"><h3>Səviyyə</h3></div>
        <div class="card" onclick="window.location.href='race.html'"><h3>Yarış</h3></div>
    </div>

    <div id="admin-panel">
        <h3 style="color: #ff4500;">Admin Paneli</h3>
        <input id="admin_id" placeholder="User ID" style="width: 80%; padding: 5px;">
        <input id="admin_bal" placeholder="Balans" style="width: 80%; padding: 5px; margin-top: 5px;">
        <button style="margin-top: 10px; background: #ff4500;" onclick="saveBalance()">Yenilə</button>
    </div>

    <script>
        const supabase = supabase.createClient('URL_BURAYA', 'ANON_KEY_BURAYA');
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: "8591374417" };
        let points = 0;

        if (user.id.toString() === "8591374417") document.getElementById('admin-panel').style.display = 'block';

        function tap() { points++; document.getElementById('balance').innerText = points; }
        function showAd() { points += 100; document.getElementById('balance').innerText = points; }
        function upgrade() { alert("Səviyyə artırıldı!"); }

        async function saveBalance() {
            const id = document.getElementById('admin_id').value;
            const bal = document.getElementById('admin_bal').value;
            await supabase.from('users').upsert({ telegram_id: id, balance: parseFloat(bal) });
            alert("Balans yeniləndi!");
        }
    </script>
</body>
</html>
