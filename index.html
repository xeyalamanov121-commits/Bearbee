<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Ultimate Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-telegram-web-app.js"></script>
    <style>
        :root { --neon-green: #00ff66; --gold-glow: #ffd700; --premium-dark: #020b05; }
        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #0a3a1f 0%, var(--premium-dark) 100%); font-family: 'Poppins', sans-serif; color: #fff; text-align: center; user-select: none; overflow: hidden; }
        .container { padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; box-sizing: border-box; }
        .header-panel { background: linear-gradient(135deg, #0d381e 0%, #051a0d 100%); border: 2px solid var(--gold-glow); border-radius: 20px; padding: 10px 30px; }
        .header-title { font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .status-card { background: rgba(4, 23, 12, 0.75); border: 1px solid rgba(0, 255, 102, 0.25); border-radius: 22px; width: 90%; padding: 15px; }
        .status-row { display: flex; justify-content: space-between; font-weight: 700; margin: 6px 0; }
        .game-area { width: 100%; height: 35vh; display: flex; justify-content: center; align-items: center; }
        .bear-avatar { font-size: 120px; cursor: pointer; transition: transform 0.1s; }
        .bear-avatar:active { transform: scale(1.2); }
        .control-panel { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .ultimate-btn { background: linear-gradient(135deg, #004d1a 0%, #001a06 100%); border: 2px solid var(--neon-green); color: var(--neon-green); font-size: 16px; font-weight: 900; padding: 16px 0; width: 88%; border-radius: 40px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel"><h1 id="txt-title" class="header-title">Bearbee Ultimate</h1></div>

    <div class="status-card">
        <div class="status-row"><span>🍯 BALANS:</span> <span id="honey-display">0</span></div>
        <div class="status-row"><span>🐻 AYI SƏVİYYƏSİ:</span> <span id="weight-display">LVL 1</span></div>
    </div>

    <div class="game-area">
        <div id="bear-node" class="bear-avatar" onclick="balTopla()">🐻</div>
    </div>

    <div class="control-panel">
        <button id="btn-collect" class="ultimate-btn" onclick="balTopla()">🐝 Sürətli Bal Topla</button>
        <button id="btn-feed" class="ultimate-btn" onclick="ayiniYedizdir()">🍯 Ayını Böyüt (300 Bal)</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://bearbee-production.up.railway.app";
    
    let honey = 0;
    let bearLvl = 1;

    async function syncData() {
        const userId = tg.initDataUnsafe?.user?.id || "test-user";
        try {
            await fetch(`${API_URL}/api/user/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, honey: honey, level: bearLvl })
            });
        } catch (e) { console.log("Sinxronizasiya edildi"); }
    }

    async function balTopla() {
        honey += 1;
        document.getElementById('honey-display').innerText = honey;
        await syncData();
    }

    async function ayiniYedizdir() {
        if (honey >= 300) {
            honey -= 300;
            bearLvl += 1;
            document.getElementById('honey-display').innerText = honey;
            document.getElementById('weight-display').innerText = "LVL " + bearLvl;
            await syncData();
        } else {
            alert("🐻 Bal azdır!");
        }
    }

    tg.ready();
    tg.expand();
</script>
</body>
</html>
