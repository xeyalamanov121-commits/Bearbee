<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bearbee Mega Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --neon-green: #00ff66;
            --neon-blue: #00ffff;
            --dark-bg: #050a08;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* Naviqasiya düymələri panelinin mövqeyini dəqiqləşdirdik */
        .tab-container {
            display: flex; width: 100%;
            background: #0b110e;
            border-bottom: 2px solid var(--neon-green);
            position: relative; z-index: 999; /* Düymələrin həmişə ən üstdə qalması üçün */
        }

        .tab-btn {
            flex: 1; padding: 15px 0;
            background: transparent; border: none;
            color: #888; font-weight: bold; font-size: 12px;
            cursor: pointer; text-transform: uppercase;
        }

        .tab-btn.active {
            color: var(--neon-green);
            background: rgba(0, 255, 102, 0.1);
            border-bottom: 3px solid var(--neon-green);
        }

        .app-section {
            display: none; width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box;
        }

        .app-section.active {
            display: block;
        }

        .cyber-panel {
            background: rgba(10, 20, 15, 0.95);
            border: 1px solid var(--neon-green);
            border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px;
        }

        .ai-core {
            width: 140px; height: 140px;
            background: radial-gradient(circle, #00ff66 0%, #001a08 80%);
            border-radius: 50%; border: 4px solid var(--neon-green);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 18px; margin: 30px auto;
            cursor: pointer;
        }

        .cyber-btn {
            width: 100%; padding: 12px; background: #000;
            border: 1px solid var(--neon-blue); color: var(--neon-blue);
            font-weight: bold; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="tab-container">
        <button id="btn-game-tab" class="tab-btn active" onclick="switchTab('game-tab')">🐝 Tapper</button>
        <button id="btn-task-tab" class="tab-btn" onclick="switchTab('task-tab')">📊 Tapşırıqlar</button>
        <button id="btn-wallet-tab" class="tab-btn" onclick="switchTab('wallet-tab')">💎 Cüzdan</button>
    </div>

    <div id="game-tab" class="app-section active">
        <div class="cyber-panel">
            <h3>Balans: <span id="txt-honey" style="color: var(--neon-green);">0</span></h3>
        </div>
        <div class="ai-core" onclick="triggerTap()">AI CORE</div>
    </div>

    <div id="task-tab" class="app-section">
        <div class="cyber-panel">
            <h3>Sponsor Tapşırıqları</h3>
            <p>Tezliklə aktivləşəcək.</p>
        </div>
    </div>

    <div id="wallet-tab" class="app-section">
        <div class="cyber-panel">
            <h3>Kripto Cüzdan Modulu</h3>
            <p>TON Swap sistemi tezliklə bərpa olunacaq.</p>
        </div>
    </div>

    <script>
        // Telegram WebApp obyektini təhlükəsiz başladırıq
        let tg = window.Telegram?.WebApp || null;
        if (tg) tg.expand();

        let score = 0;

        // 🚨 ƏN SADƏ VƏ ELEMENTAR KLİKLƏMƏ FUNKSİYALARI
        function switchTab(tabId) {
            console.log("Tab dəyişdirilir: " + tabId);
            
            // Bütün bölmələri gizlət
            document.getElementById('game-tab').style.display = 'none';
            document.getElementById('task-tab').style.display = 'none';
            document.getElementById('wallet-tab').style.display = 'none';
            
            // Bütün düymələrin aktivliyini sil
            document.getElementById('btn-game-tab').classList.remove('active');
            document.getElementById('btn-task-tab').classList.remove('active');
            document.getElementById('btn-wallet-tab').classList.remove('active');
            
            // Seçilən bölməni aç və düyməni aktiv et
            document.getElementById(tabId).style.display = 'block';
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        function triggerTap() {
            score++;
            document.getElementById('txt-honey').innerText = score;
        }
    </script>
</body>
</html>
