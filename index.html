<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Cyber Arena</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; }
    #hud { position:absolute; top:10px; left:10px; }
    #hud div { margin:5px 0; }
    #hud button { background:#00ffcc; border:none; padding:8px; cursor:pointer; }
    .section { margin-top:20px; }
    .card { border:1px solid #444; padding:10px; margin:10px; display:inline-block; width:200px; vertical-align:top; }
    .card img { width:100%; height:auto; }
    button { background:#00ffcc; border:none; padding:8px; cursor:pointer; margin-top:5px; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="energy">Enerji: 100</div>
    <div id="balance">Balans: 0</div>
    <button onclick="watchAd()">Reklama bax → Enerji +30</button>
  </div>

  <div class="section">
    <h2>Kartlar</h2>
    <div id="cards"></div>
  </div>

  <div class="section">
    <h2>Marketplace</h2>
    <div id="market"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // --- Supabase bağlantısı ---
    const supabase = supabase.createClient(
      "https://YOUR_PROJECT.supabase.co",
      "YOUR_PUBLIC_ANON_KEY"
    );

    let energy = 100, balance = 0;

    async function loadBalance() {
      const user = (await supabase.auth.getUser()).data.user;
      if (!user) return;
      const { data, error } = await supabase.from("profiles").select("balance").eq("id", user.id).single();
      if (!error && data) {
        balance = data.balance;
        updateHUD();
      }
    }

    async function saveBalance() {
      const user = (await supabase.auth.getUser()).data.user;
      if (!user) return;
      await supabase.from("profiles").update({ balance }).eq("id", user.id);
    }

    function updateHUD() {
      document.getElementById("energy").innerText = "Enerji: " + energy;
      document.getElementById("balance").innerText = "Balans: " + balance;
    }

    function watchAd() {
      energy = Math.min(100, energy + 30); // reklam → +30 enerji, maksimum 100
      updateHUD();
    }

    // --- Three.js səhnəsi (clickleme) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geometry = new THREE.IcosahedronGeometry(3, 1);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffff });
    const crystal = new THREE.Mesh(geometry, material);
    scene.add(crystal);

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10,10,10);
    scene.add(light);

    camera.position.z = 10;

    renderer.domElement.addEventListener("click", async () => {
      if (energy > 0) {
        balance += 15;   // hər klikdə balans +15
        energy -= 10;    // hər klikdə enerji −10
        updateHUD();
        await saveBalance(); // Supabase‑də balansı saxla
      } else {
        alert("Enerji bitdi! Reklama baxaraq doldur.");
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      crystal.rotation.x += 0.01;
      crystal.rotation.y += 0.02;
      renderer.render(scene, camera);
    }
    animate();

    // --- Kartların siyahısı ---
    async function loadCards() {
      const { data, error } = await supabase.from("cards").select("*");
      if (error) { console.error(error); return; }
      const container = document.getElementById("cards");
      container.innerHTML = "";
      data.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${card.image_url}" alt="${card.name}">
          <h3>${card.name}</h3>
          <p>Qiymət: ${card.price}</p>
          <p>Güc: +${card.power_increase}</p>
          <button onclick="buyCard(${card.id})">Buy</button>
        `;
        container.appendChild(div);
      });
    }

    async function buyCard(cardId) {
      const user = (await supabase.auth.getUser()).data.user;
      if (!user) { alert("Əvvəl login ol!"); return; }
      const { error } = await supabase.rpc("buy_card", {
        user_id: user.id,
        card_id: cardId
      });
      if (error) { alert("Xəta: " + error.message); }
      else { alert("Kart uğurla alındı!"); loadCards(); }
    }

    // --- Marketplace ---
    async function loadMarket() {
      const { data, error } = await supabase.from("market").select(`
        id, price, is_sold,
        cards (name, image_url, power_increase),
        seller_id
      `).eq("is_sold", false);
      if (error) { console.error(error); return; }
      const container = document.getElementById("market");
      container.innerHTML = "";
      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${item.cards.image_url}" alt="${item.cards.name}">
          <h3>${item.cards.name}</h3>
          <p>Qiymət: ${item.price}</p>
          <p>Güc: +${item.cards.power_increase}</p>
          <button onclick="buyFromMarket(${item.id})">Buy</button>
        `;
        container.appendChild(div);
      });
    }

    async function buyFromMarket(marketId) {
      const user = (await supabase.auth.getUser()).data.user;
      if (!user) { alert("Əvvəl login ol!"); return; }
      const { error } = await supabase.rpc("buy_from_market", {
        buyer_id: user.id,
        market_id: marketId
      });
      if (error) { alert("Xəta: " + error.message); }
      else { alert("Kart uğurla alındı!"); loadMarket(); }
    }

    // İlk yükləmə
    loadBalance();
    loadCards();
    loadMarket();
  </script>
</body>
</html>
