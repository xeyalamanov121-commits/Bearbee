<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bearbee Mini App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffaa00; /* Narıncı fon */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 350px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            color: #d47a00;
        }

        .honey-counter {
            font-size: 22px;
            font-weight: bold;
            background: #fff3cd;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #ffeeba;
            margin-bottom: 25px;
            display: inline-block;
            width: 80%;
        }

        .click-btn {
            background: #ffc107;
            border: none;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            font-size: 70px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            outline: none;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .click-btn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .status-text {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Bearbee Oyun</h1>
        <div class="honey-counter">🍯 <span id="score">0.0</span> qram</div>
        
        <div>
            <button class="click-btn" id="beeBtn">🐝</button>
        </div>
        
        <div class="status-text">Pətəyə toxunaraq bal toplayın!</div>
    </div>

    <script>
        let score = 0.0;
        const scoreEl = document.getElementById('score');
        const btn = document.getElementById('beeBtn');

        // Balansı yaddaşdan oxumaq (əgər əvvəl oynanılıbsa)
        if (localStorage.getItem('bearbee_bal')) {
            score = parseFloat(localStorage.getItem('bearbee_bal'));
            scoreEl.innerText = score.toFixed(1);
        }

        btn.addEventListener('click', () => {
            score += 0.5; // Hər klikdə 0.5 qram bal artır
            scoreEl.innerText = score.toFixed(1);
            
            // Balansı telefonun yaddaşında saxlayır ki, səhifə bağlananda sıfırlanmasın
            localStorage.setItem('bearbee_bal', score);
        });
    </script>
</body>
</html>
