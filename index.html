<!DOCTYPE html>

    <style>
        :root { --gold: #ffd700; --bg: #0a0a0a; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }

        .balance-box { font-size: 32px; color: var(--gold); font-weight: bold; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { 
            background: var(--card); padding: 25px 15px; border-radius: 20px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s;
        }
        .card:hover { background: rgba(255,255,255,0.1); border-color: var(--gold); }
        
        .btn-tap { 
            font-size: 70px; background: none; border: none; cursor: pointer; 
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.4));
        }
        .btn-tap:active { transform: scale(0.92); }
    </style>
</head>
